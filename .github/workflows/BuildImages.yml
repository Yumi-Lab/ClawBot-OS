name: Build ClawbotOS Image
on:
  push:
    branches:
      - "develop"
    paths:
      - "src/modules/**"
      - "src/build_dist"
      - "config/**"
      - ".github/workflows/BuildImages.yml"
      - ".github/workflow_config.yml"
      - ".github/scripts/setup_matrix.py"
    tags-ignore:
      - "**"
  pull_request:
    types: [opened, edited, reopened, synchronize]
    paths:
      - "src/**"
      - "config/**"
      - ".github/workflows/BuildImages.yml"
      - ".github/scripts/setup_matrix.py"
      - ".github/workflow_config.yml"

  workflow_dispatch:

# Allow to stop obsolete workflows
concurrency:
  group: ci-build-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-22.04-arm
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Matrix
        id: set-matrix
        run: |
          PY_INT=$(command -v python3)
          CONFIG="${{ github.workspace }}/.github/workflow_config.yml"
          GROUP="buildtest"
          $PY_INT ${{ github.workspace }}/.github/scripts/setup_matrix.py -c $CONFIG -g $GROUP --git

  build:
    needs: setup
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: repository
          submodules: true

      - name: Resolve latest SmartPi-armbian base image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/Yumi-Lab/SmartPi-armbian/releases/latest --jq '.tag_name')
          BASE="https://github.com/Yumi-Lab/SmartPi-armbian/releases/download/${TAG}"

          SMARTPI1_IMG=$(gh api repos/Yumi-Lab/SmartPi-armbian/releases/latest \
            --jq '.assets[] | select(.name | test("smartpi1-bookworm.*server.*\\.img\\.xz$")) | .name')
          SMARTPAD_IMG=$(gh api repos/Yumi-Lab/SmartPi-armbian/releases/latest \
            --jq '.assets[] | select(.name | test("smartpad-trixie.*server.*\\.img\\.xz$")) | .name')

          echo "SmartPi-armbian release: ${TAG}"
          echo "Smart Pi One image: ${SMARTPI1_IMG}"
          echo "SmartPad image:     ${SMARTPAD_IMG}"

          # Patch Smart Pi One config
          sed -i "s|DOWNLOAD_URL_IMAGE=.*smartpi1.*|DOWNLOAD_URL_IMAGE=\"${BASE}/${SMARTPI1_IMG}\"|" \
            repository/config/armbian/default
          sed -i "s|DOWNLOAD_URL_CHECKSUM=.*smartpi1.*|DOWNLOAD_URL_CHECKSUM=\"${BASE}/${SMARTPI1_IMG}.sha256\"|" \
            repository/config/armbian/default

          # Patch SmartPad config
          sed -i "s|DOWNLOAD_URL_IMAGE=.*smartpad.*|DOWNLOAD_URL_IMAGE=\"${BASE}/${SMARTPAD_IMG}\"|" \
            repository/config/armbian/smartpad
          sed -i "s|DOWNLOAD_URL_CHECKSUM=.*smartpad.*|DOWNLOAD_URL_CHECKSUM=\"${BASE}/${SMARTPAD_IMG}.sha256\"|" \
            repository/config/armbian/smartpad

      - name: Build image
        id: build
        uses: ./repository/.github/actions/build
        with:
          config: ${{ matrix.config }}
          custompios-ref: 1.5.0

      - name: Fix boot UUID in image
        shell: bash
        run: |
          IMG=$(ls repository/src/workspace/*.img)
          echo "Fixing boot UUID in ${IMG}..."

          # Attach image as loop device with partition scanning
          LOOPDEV=$(sudo losetup -fP --show "$IMG")
          echo "Loop device: ${LOOPDEV}"

          # Read actual UUID of root partition (p2)
          ROOT_UUID=$(sudo blkid -o value -s UUID "${LOOPDEV}p2")
          echo "Actual root UUID: ${ROOT_UUID}"

          # Mount boot partition (p1 = FAT /boot)
          BOOTMNT=$(mktemp -d)
          sudo mount "${LOOPDEV}p1" "$BOOTMNT"

          # Update armbianEnv.txt if it exists
          if [[ -f "${BOOTMNT}/armbianEnv.txt" ]]; then
              echo "Before fix:"
              grep -i rootdev "${BOOTMNT}/armbianEnv.txt" || true
              sudo sed -i "s|^rootdev=.*|rootdev=UUID=${ROOT_UUID}|" "${BOOTMNT}/armbianEnv.txt"
              echo "After fix:"
              grep -i rootdev "${BOOTMNT}/armbianEnv.txt"
          else
              echo "WARNING: armbianEnv.txt not found in boot partition"
              ls "$BOOTMNT" || true
          fi

          sudo umount "$BOOTMNT"
          sudo losetup -d "$LOOPDEV"
          echo "UUID fix complete."

      - name: Rename image file
        id: move-image
        if: always()
        shell: bash
        run: |
          source repository/src/config
          NOW="$(date +"%Y-%m-%d")"
          IMAGE="${NOW}-${DIST_NAME}-${DIST_VERSION}-${{ steps.build.outputs.type }}-${{ steps.build.outputs.sbc }}"

          mv repository/src/workspace/*.img $IMAGE.img

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Upload failed Logfile
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-${{ steps.move-image.outputs.image }}.log
          path: repository/src/build.log

      - name: Compressing Image
        shell: bash
        run: |
          CPU_COUNT="$(nproc)"
          echo -e "\e[32mUsing ${CPU_COUNT} Cores for compression...\e[0m"
          xz -efkvz9T"${CPU_COUNT}" ${{ steps.move-image.outputs.image }}.img || true

      - name: Calculating checksums
        shell: bash
        run: |
          sha256sum ${{ steps.move-image.outputs.image }}.img > ${{ steps.move-image.outputs.image }}.img.sha256
          sha256sum ${{ steps.move-image.outputs.image }}.img.xz > ${{ steps.move-image.outputs.image }}.img.xz.sha256

      - name: Upload Compressed Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.xz
          path: ${{ steps.move-image.outputs.image }}.img.xz

      - name: Upload Compressed Image Checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.xz.sha256
          path: ${{ steps.move-image.outputs.image }}.img.xz.sha256

      - name: Upload Image Checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.move-image.outputs.image }}.img.sha256
          path: ${{ steps.move-image.outputs.image }}.img.sha256
