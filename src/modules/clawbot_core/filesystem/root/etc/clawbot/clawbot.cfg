# ClawbotOS — Core Configuration
# Equivalent to moonraker.cfg for the ClawbotOS ecosystem
#
# Each installed module drops its own [update_manager] section
# in /etc/clawbot/conf.d/<module>.cfg via its install.sh.
# This file declares only the core components.

[server]
host: 0.0.0.0
port: 8090

[llm]
default_model = kimi-for-coding
provider = kimi
base_url = https://api.moonshot.cn/v1

[whatsapp]
mode = personal
admins =
allow_from = *
blacklist =
default_model = default
default_mode = core
vault_2fa = off
user_tools = web_search

[update_manager clawbot-core]
type: git_repo
path: /usr/local/lib/clawbot-core
origin: https://github.com/Yumi-Lab/clawbot-core.git
primary_branch: main
managed_services: clawbot-core.service
